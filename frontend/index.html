<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Portal</title>
  <!-- Google Fonts for Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --border: #e2e8f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      text-align: center;
      background: var(--card-bg);
      padding: 40px 30px;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03), 
                  0 1px 3px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    p {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    .status-box {
      margin-bottom: 30px;
      padding: 16px;
      border-radius: 12px;
      background-color: #f1f5f9;
      font-size: 0.95rem;
      font-weight: 500;
      border: 1px dashed var(--border);
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 12px;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      text-align: center;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.1), 0 2px 4px -1px rgba(79, 70, 229, 0.06);
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background-color: var(--card-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background-color: #f8fafc;
      transform: translateY(-1px);
    }

    .btn-danger {
      background-color: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background-color: #dc2626;
      transform: translateY(-1px);
    }

    footer {
      margin-top: 30px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Security Portal</h1>
    <p>A minimalist entry gate powered by PostgreSQL.</p>
    
    <div id="auth-status" class="status-box">
      Checking connection status...
    </div>

    <div class="btn-group" id="auth-actions">
      <!-- Dynamic Buttons Rendered by JS -->
    </div>
  </div>

  <footer>
    &copy; Odoo Hackathon 2026. Secure & Minimal.
  </footer>

  <script src="js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const authStatus = document.getElementById('auth-status');
      const authActions = document.getElementById('auth-actions');

      const token = localStorage.getItem('token');
      const userJSON = localStorage.getItem('user');

      if (token && userJSON) {
        try {
          const user = JSON.parse(userJSON);
          authStatus.textContent = `Logged in as: ${user.email} (${user.role})`;
          authStatus.style.backgroundColor = '#ecfdf5';
          authStatus.style.color = '#065f46';
          authStatus.style.borderColor = '#a7f3d0';

          authActions.innerHTML = `
            <button class="btn btn-danger" id="btn-logout">Sign Out</button>
          `;

          document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.reload();
          });
        } catch (e) {
          clearSession();
        }
      } else {
        authStatus.textContent = 'Welcome Guest. Please sign in or create an account.';
        authStatus.style.backgroundColor = '#f1f5f9';
        authStatus.style.color = '#475569';
        authStatus.style.borderColor = '#e2e8f0';

        authActions.innerHTML = `
          <a href="login.html" class="btn btn-primary">Sign In</a>
          <a href="signup.html" class="btn btn-secondary">Create Account</a>
        `;
      }

      function clearSession() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.reload();
      }
    });
  </script>
</body>
</html>
