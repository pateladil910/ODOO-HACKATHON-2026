<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports &amp; Analytics - TransitOps</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="app-sidebar" id="appSidebar">
            <div class="sidebar-header"><a href="dashboard.html" class="sidebar-brand"><div class="sidebar-icon">T</div><span>TransitOps</span></a></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item" data-roles="all"><i class="ph ph-squares-four"></i><span>Dashboard</span></a>
                <a href="vehicles.html" class="nav-item" data-roles="manager"><i class="ph ph-car"></i><span>Vehicle Registry</span></a>
                <a href="drivers.html" class="nav-item" data-roles="manager,safety"><i class="ph ph-identification-card"></i><span>Drivers</span></a>
                <a href="trips.html" class="nav-item" data-roles="manager,driver"><i class="ph ph-path"></i><span>Trips</span></a>
                <a href="maintenance.html" class="nav-item" data-roles="manager"><i class="ph ph-wrench"></i><span>Maintenance</span></a>
                <a href="expenses.html" class="nav-item" data-roles="manager,finance"><i class="ph ph-receipt"></i><span>Fuel &amp; Expenses</span></a>
                <a href="reports.html" class="nav-item active" data-roles="manager,finance"><i class="ph ph-chart-bar"></i><span>Reports</span></a>
                <a href="settings.html" class="nav-item" data-roles="admin,manager"><i class="ph ph-gear"></i><span>Settings</span></a>
            </nav>
            <div class="sidebar-footer"><div class="user-profile"><div class="user-avatar">U</div><div class="user-info"><div class="user-name">User Name</div><div class="user-role">Role</div></div><button class="logout-btn" id="logoutBtn" title="Logout"><i class="ph ph-sign-out"></i></button></div></div>
        </aside>

        <main class="app-main">
            <header class="app-header">
                <div class="header-left">
                    <button class="mobile-toggle" id="mobileToggle"><i class="ph ph-list"></i></button>
                    <div class="header-search"><i class="ph ph-magnifying-glass"></i><input type="text" placeholder="Search reports..."></div>
                </div>
                <div class="header-right">
                    <div class="header-user"><span class="header-user-name">User</span><div class="header-user-role" id="userRoleBadge">- <div class="header-user-avatar">U</div></div></div>
                </div>
            </header>

            <div class="app-content" id="reportContent">

                <!-- Action Bar -->
                <div style="display:flex;justify-content:flex-end;gap:0.75rem;margin-bottom:1.25rem;" data-html2canvas-ignore>
                    <button class="btn btn-sm" id="exportPdfBtn"><i class="ph ph-file-pdf"></i> Export PDF</button>
                    <button class="btn btn-primary btn-sm" id="exportCsvBtn"><i class="ph ph-download"></i> Export CSV</button>
                </div>

                <!-- KPI Row -->
                <div class="kpi-grid" style="grid-template-columns: repeat(4, 1fr);">
                    <div class="kpi-card kpi-blue">
                        <div class="kpi-title">Fuel Efficiency</div>
                        <div class="kpi-value" id="kpiFuelEff">0 <span style="font-size:1rem;color:var(--text-secondary);font-weight:400;">km/l</span></div>
                    </div>
                    <div class="kpi-card kpi-headline">
                        <div class="kpi-title">Fleet Utilization</div>
                        <div class="kpi-value" id="kpiUtil">0%</div>
                    </div>
                    <div class="kpi-card kpi-amber">
                        <div class="kpi-title">Operational Cost</div>
                        <div class="kpi-value" id="kpiCost">$0</div>
                    </div>
                    <div class="kpi-card kpi-green">
                        <div class="kpi-title">Vehicle ROI</div>
                        <div class="kpi-value" id="kpiRoi">0%</div>
                    </div>
                </div>

                <!-- Charts Row -->
                <div class="charts-grid">
                    <div class="chart-card">
                        <div class="chart-header">
                            <span>Monthly Revenue</span>
                            <span class="chart-header-sub">YTD</span>
                        </div>
                        <div class="bar-chart" id="revenueChart">
                            <div style="width:100%;text-align:center;color:var(--text-secondary);">Loading revenue data...</div>
                        </div>
                    </div>

                    <div class="chart-card">
                        <div class="chart-header">
                            <span>Top Costliest Vehicles</span>
                        </div>
                        <div class="progress-list" id="costliestChart">
                            <div style="width:100%;text-align:center;color:var(--text-secondary);">Loading vehicle data...</div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
