<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TransitOps</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="app-sidebar" id="appSidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="sidebar-brand">
                    <div class="sidebar-icon">T</div>
                    <span>TransitOps</span>
                </a>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active" data-roles="all">
                    <i class="ph ph-squares-four"></i>
                    <span>Dashboard</span>
                </a>
                <a href="vehicles.html" class="nav-item" data-roles="manager">
                    <i class="ph ph-car"></i>
                    <span>Vehicle Registry</span>
                </a>
                <a href="drivers.html" class="nav-item" data-roles="manager,safety">
                    <i class="ph ph-identification-card"></i>
                    <span>Drivers</span>
                </a>
                <a href="trips.html" class="nav-item" data-roles="manager,driver">
                    <i class="ph ph-path"></i>
                    <span>Trips</span>
                </a>
                <a href="maintenance.html" class="nav-item" data-roles="manager">
                    <i class="ph ph-wrench"></i>
                    <span>Maintenance</span>
                </a>
                <a href="expenses.html" class="nav-item" data-roles="manager,finance">
                    <i class="ph ph-receipt"></i>
                    <span>Fuel & Expenses</span>
                </a>
                <a href="reports.html" class="nav-item" data-roles="manager,finance">
                    <i class="ph ph-chart-bar"></i>
                    <span>Reports</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">U</div>
                    <div class="user-info">
                        <div class="user-name">User Name</div>
                        <div class="user-role">Role</div>
                    </div>
                    <button class="logout-btn" id="logoutBtn" title="Logout">
                        <i class="ph ph-sign-out"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Header -->
            <header class="app-header">
                <div class="header-left">
                    <button class="mobile-toggle" id="mobileToggle">
                        <i class="ph ph-list"></i>
                    </button>
                    <h2 class="page-title">Dashboard Overview</h2>
                </div>
                <div class="header-right">
                    <button class="header-action" title="Notifications">
                        <i class="ph ph-bell"></i>
                    </button>
                    <button class="header-action" title="Settings">
                        <i class="ph ph-gear"></i>
                    </button>
                </div>
            </header>

            <!-- Page Content -->
            <div class="app-content">
                <!-- Dashboard content will go here in Phase 2 -->
                <p>Welcome to TransitOps. The Dashboard components will be implemented in Phase 2.</p>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
