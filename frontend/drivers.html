<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivers Registry - TransitOps</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="app-sidebar" id="appSidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="sidebar-brand">
                    <div class="sidebar-icon">T</div>
                    <span>TransitOps</span>
                </a>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item" data-roles="all">
                    <i class="ph ph-squares-four"></i>
                    <span>Dashboard</span>
                </a>
                <a href="vehicles.html" class="nav-item" data-roles="manager">
                    <i class="ph ph-car"></i>
                    <span>Vehicle Registry</span>
                </a>
                <a href="drivers.html" class="nav-item active" data-roles="manager,safety">
                    <i class="ph ph-identification-card"></i>
                    <span>Drivers</span>
                </a>
                <a href="trips.html" class="nav-item" data-roles="manager,driver">
                    <i class="ph ph-path"></i>
                    <span>Trips</span>
                </a>
                <a href="maintenance.html" class="nav-item" data-roles="manager">
                    <i class="ph ph-wrench"></i>
                    <span>Maintenance</span>
                </a>
                <a href="expenses.html" class="nav-item" data-roles="manager,finance">
                    <i class="ph ph-receipt"></i>
                    <span>Fuel & Expenses</span>
                </a>
                <a href="reports.html" class="nav-item" data-roles="manager,finance">
                    <i class="ph ph-chart-bar"></i>
                    <span>Reports</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">U</div>
                    <div class="user-info">
                        <div class="user-name">User Name</div>
                        <div class="user-role">Role</div>
                    </div>
                    <button class="logout-btn" id="logoutBtn" title="Logout">
                        <i class="ph ph-sign-out"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Header -->
            <header class="app-header">
                <div class="header-left">
                    <button class="mobile-toggle" id="mobileToggle">
                        <i class="ph ph-list"></i>
                    </button>
                    <h2 class="page-title">Drivers Registry</h2>
                </div>
                <div class="header-right">
                    <button class="header-action" title="Notifications">
                        <i class="ph ph-bell"></i>
                    </button>
                    <button class="header-action" title="Settings">
                        <i class="ph ph-gear"></i>
                    </button>
                </div>
            </header>

            <!-- Page Content -->
            <div class="app-content">
                <!-- Action Header -->
                <div class="data-table-container">
                    <div class="data-table-header">
                        <h3 class="data-table-title">Fleet Drivers</h3>
                        <button class="btn btn-primary" id="openAddModalBtn">
                            <i class="ph ph-plus" style="margin-right: 8px;"></i> Register Driver
                        </button>
                    </div>

                    <!-- Search and Filter -->
                    <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search by name or license number..." style="max-width: 300px; box-shadow: var(--shadow-3d-btn);">
                        <select id="statusFilter" class="form-control" style="max-width: 200px; box-shadow: var(--shadow-3d-btn);">
                            <option value="">All Statuses</option>
                            <option value="Available">Available</option>
                            <option value="On Trip">On Trip</option>
                            <option value="Off Duty">Off Duty</option>
                            <option value="Suspended">Suspended</option>
                        </select>
                    </div>

                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Driver Name</th>
                                <th>License Info</th>
                                <th>License Expiry</th>
                                <th>Contact Number</th>
                                <th>Safety Score</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="driversTableBody">
                            <tr>
                                <td colspan="7" style="text-align: center; color: var(--text-muted);">Loading drivers registry...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Driver Modal Overlay -->
    <div class="modal-overlay" id="driverModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Register New Driver</h3>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <form id="driverForm">
                <input type="hidden" id="driverId">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="e.g. John Doe" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="licenseNumber">License Number</label>
                    <input type="text" id="licenseNumber" class="form-control" placeholder="e.g. DL-12345678" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="licenseCategory">License Category</label>
                    <input type="text" id="licenseCategory" class="form-control" placeholder="e.g. Class A Commercial" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="expiryDate">License Expiry Date</label>
                    <input type="date" id="expiryDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="contactNumber">Contact Number</label>
                    <input type="text" id="contactNumber" class="form-control" placeholder="e.g. +1-555-0100" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="safetyScore">Safety Score (0 - 100)</label>
                    <input type="number" step="0.01" min="0" max="100" id="safetyScore" class="form-control" placeholder="e.g. 95.5" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="status">Status</label>
                    <select id="status" class="form-control" required>
                        <option value="Available">Available</option>
                        <option value="On Trip">On Trip</option>
                        <option value="Off Duty">Off Duty</option>
                        <option value="Suspended">Suspended</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="padding: 0.875rem;">Save Driver Details</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/drivers.js"></script>
</body>
</html>
