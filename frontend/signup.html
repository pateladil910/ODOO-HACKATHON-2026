<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <!-- Google Fonts for Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/signup.css">
</head>
<body>

  <div class="perspective-container">
    <div class="signup-card" id="signup-card">
      <div class="card-depth-layer"></div>
      
      <div class="card-content">
        <h2>Create Account</h2>
        <p class="subtitle">Join our platform to get started</p>

        <form id="signup-form">
          <div class="input-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <input type="email" id="email" placeholder="name@example.com" required autocomplete="email">
              <div class="input-depth"></div>
            </div>
          </div>

          <div class="input-group">
            <label for="role">Account Role</label>
            <div class="input-wrapper">
              <select id="role" required>
                <option value="user">Standard User</option>
                <option value="admin">Administrator</option>
              </select>
              <div class="input-depth"></div>
            </div>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password">
              <div class="input-depth"></div>
            </div>
          </div>

          <div class="input-group">
            <label for="confirm-password">Confirm Password</label>
            <div class="input-wrapper">
              <input type="password" id="confirm-password" placeholder="••••••••" required autocomplete="new-password">
              <div class="input-depth"></div>
            </div>
          </div>

          <button type="submit" class="btn-3d" id="btn-submit">
            <span class="btn-3d-front">Sign Up</span>
          </button>
        </form>

        <div class="card-footer">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
