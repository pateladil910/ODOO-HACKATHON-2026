<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitOps - Redirecting</title>
    <script>
        // Check if user is logged in (mock), else redirect to login
        const user = localStorage.getItem('transitOpsUser');

        } else {
            window.location.href = 'login.html';
        }
    </script>
</head>
