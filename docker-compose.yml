version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hackathon_postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_password}
      POSTGRES_DB: ${DB_NAME:-hackathon_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-hackathon_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackathon_backend_app
    restart: always
    command: npm run dev
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      PORT: ${PORT:-5000}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres_password}
      DB_NAME: ${DB_NAME:-hackathon_db}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_12345}
      API_KEY: ${API_KEY:-your_secret_api_key_for_external_clients}
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
